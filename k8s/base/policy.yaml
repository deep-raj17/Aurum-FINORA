apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: finora
  namespace: finora
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: finora
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finora-default-deny
  namespace: finora
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: finora-api
  namespace: finora
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: finora
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
