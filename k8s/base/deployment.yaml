apiVersion: apps/v1
kind: Deployment
metadata:
  name: finora-blue
  namespace: finora
  labels:
    app.kubernetes.io/name: finora
    finora.io/color: blue
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finora
      finora.io/color: blue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finora
        finora.io/color: blue
    spec:
      serviceAccountName: finora
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/OWNER/finora:RELEASE_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: finora-config
          env:
            - name: AURUM_API_KEY_FILE
              value: /run/secrets/api-key
          volumeMounts:
            - name: api-key
              mountPath: /run/secrets
              readOnly: true
            - name: data
              mountPath: /var/lib/finora
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 30
      volumes:
        - name: api-key
          secret:
            secretName: finora-secrets
            items:
              - key: api-key
                path: api-key
        - name: data
          persistentVolumeClaim:
            claimName: finora-data
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
