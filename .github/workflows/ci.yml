name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev,api,security]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts
      - run: mypy src
      - run: pytest --cov=aurum --cov-report=term-missing --cov-fail-under=95
      - run: pip-audit -r requirements-api.txt
