name: Research experiment
description: Track a FINORA research validation experiment or ablation.
title: "[Research] "
labels: ["research", "triage"]
body:
  - type: input
    id: name
    attributes:
      label: Experiment name
      placeholder: "multi-asset expanding-window baseline comparison"
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: What should improve and why?
    validations:
      required: true
  - type: textarea
    id: protocol
    attributes:
      label: Protocol
      description: Data sources, assets, date ranges, purging, windows, metrics, costs, and baselines.
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results
      description: Metrics, artifacts, logs, plots, and negative findings.
  - type: textarea
    id: limitations
    attributes:
      label: Limitations and blockers
      description: Credential gaps, data-license issues, small sample caveats, or reproducibility risks.
  - type: checkboxes
    id: honesty
    attributes:
      label: Research honesty
      options:
        - label: I will not represent execution evidence as market alpha without statistical support.
          required: true
