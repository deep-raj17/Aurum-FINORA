name: Provider integration
description: Track a provider connector, credential, rate-limit, or data-quality issue.
title: "[Provider] "
labels: ["provider", "triage"]
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Yahoo Finance
        - Alpha Vantage
        - Tiingo
        - Finnhub
        - FRED
        - SEC EDGAR
        - CoinGecko
        - Binance
        - World Bank
        - IMF
        - ECB
        - OECD
        - Stooq
        - Nasdaq Data Link
        - Financial Modeling Prep
        - Other
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: Authentication, response schema, pagination, rate limit, data quality, or freshness concern.
    validations:
      required: true
  - type: textarea
    id: sanitized_evidence
    attributes:
      label: Sanitized evidence
      description: HTTP status, provider message, validation output, or logs with secrets removed.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Command, fixture, live gate, or data-quality check that should pass.
  - type: checkboxes
    id: credential_safety
    attributes:
      label: Credential safety
      options:
        - label: I did not include API keys, tokens, account IDs, private endpoints, or proprietary datasets.
          required: true
