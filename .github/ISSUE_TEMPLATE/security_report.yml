name: Security report metadata
description: Track a sanitized security concern; disclose exploitable details privately.
title: "[Security] "
labels: ["security", "triage"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, tokens, private data, or exploit details here.
  - type: textarea
    id: summary
    attributes:
      label: Sanitized summary and affected component
    validations:
      required: true
  - type: dropdown
    id: private
    attributes:
      label: Was the full report submitted through a private security advisory?
      options: ["Yes", "Not yet"]
    validations:
      required: true
  - type: textarea
    id: containment
    attributes:
      label: Sanitized containment status
