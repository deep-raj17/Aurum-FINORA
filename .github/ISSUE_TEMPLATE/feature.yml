name: Feature request
description: Propose a scoped FINORA capability or documentation improvement.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: Phase 8 release policy: do not propose unvalidated production claims or autonomous trading behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or research workflow is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep scope tight and note whether architecture changes are required.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Tests, docs, metrics, release gates, or model-risk review needed.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and limitations
      description: Data, security, compliance, and model-risk impact.
