# Aurum / FINORA — local infrastructure for the retrieval + graph layers.
# Brings up Qdrant (vector DB) and Neo4j (graph DB). The core forecasting
# demo does NOT require these; they are needed for the RAG/graph layers.
#
#   docker compose up -d
#
services:
  aurum:
    build: .
    container_name: aurum-api
    ports:
      - "8000:8000"
    environment:
      - AURUM_ENV=dev
      - AURUM_DATABASE_PATH=/app/data/aurum.sqlite3
      - AURUM_API_KEY=${AURUM_API_KEY:-}
    volumes:
      - aurum_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  finora-kdq:
    profiles: ["kdq"]
    build:
      context: .
      dockerfile: Dockerfile.kdq
    container_name: finora-kdq
    ports:
      - "8001:8001"
    environment:
      - AURUM_ENV=dev
      - AURUM_DATABASE_PATH=/app/data/aurum.sqlite3
      - AURUM_API_KEY=${AURUM_API_KEY:-}
      - FINORA_KDQ_ARTIFACT=${FINORA_KDQ_ARTIFACT:-/app/artifacts/finora-kdq}
    volumes:
      - aurum_kdq_data:/app/data
      - aurum_kdq_artifacts:/app/artifacts:ro
    restart: unless-stopped

  finora-ui:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: finora-ui
    ports:
      - "8501:8501"
    environment:
      - FINORA_API_URL=http://aurum:8000
      - AURUM_API_KEY=${AURUM_API_KEY:-}
    depends_on:
      aurum:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: aurum-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: aurum-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/aurum_dev_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # Optional: MLflow tracking server (otherwise uses local ./mlruns)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.0
    container_name: aurum-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/store
    ports:
      - "5000:5000"
    volumes:
      - mlflow_store:/mlflow/store
    restart: unless-stopped

  postgres:
    profiles: ["production-data"]
    image: postgres:16.9-alpine
    container_name: finora-postgres
    environment:
      - POSTGRES_DB=finora
      - POSTGRES_USER=finora
      - POSTGRES_PASSWORD=${FINORA_POSTGRES_PASSWORD:-finora_local_research_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/001_audit_ledger.sql:/docker-entrypoint-initdb.d/001_audit_ledger.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finora -d finora"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.4.1
    container_name: aurum-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.0.2
    container_name: aurum-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-finora_dev_only}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  aurum_data:
  aurum_kdq_data:
  aurum_kdq_artifacts:
    external: true
    name: aurum_aurum_kdq_artifacts
  qdrant_storage:
  neo4j_data:
  mlflow_store:
  prometheus_data:
  grafana_data:
  postgres_data:
