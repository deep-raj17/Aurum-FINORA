horizons: [1d, 5d, 10d, 20d]
models: [naive, random, buy_hold, momentum, LightGBM, XGBoost, CatBoost]
baselines: [random, buy_hold, momentum, moving_average]

validation:
  method: walk-forward expanding window
  minimum_train_size: 504
  step_size: 21
  max_splits: 4

costs:
  spread_bps: 2.0
  slippage_bps: 5.0
  commission_bps: 1.0

regimes: [bull, bear, sideways, high_volatility]
metrics:
  - accuracy
  - ROC-AUC
  - F1
  - Sharpe
  - Sortino
  - Calmar
  - max_drawdown
  - turnover
  - bootstrap_p
  - deflated_sharpe

decision_rules:
  significance_level: 0.05
  min_observations: 12
  min_assets_for_promising: 2
  min_regimes_for_promising: 2
  min_assets_for_validated: 5
  min_regimes_for_validated: 3
  require_positive_cost_adjusted_sharpe: true
  require_beats_random: true
  require_beats_buy_hold: true
  require_beats_momentum: true
  require_beats_moving_average: true
