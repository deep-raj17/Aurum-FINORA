replicaCount: 3
deployment:
  color: blue
image:
  repository: ghcr.io/OWNER/finora
  tag: RELEASE_SHA
  pullPolicy: IfNotPresent
service:
  port: 80
resources:
  requests: {cpu: 500m, memory: 1Gi}
  limits: {cpu: "2", memory: 4Gi}
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
gpu:
  enabled: false
  count: 1
  nodeSelector: {}
  tolerations: []
secretName: finora-secrets
config:
  environment: production
  sentimentModel: ProsusAI/finbert
persistence:
  enabled: true
  size: 20Gi
serviceMonitor:
  enabled: false
